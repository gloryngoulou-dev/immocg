<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZLM0TRVDG9"></script>
<script src="js/gtag.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoCG — Inscription Agence</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F7F3EC; color: #2C2C28; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: #1A1A18; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; }
    .logo span { color: #C9963A; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
    }

    .card-title { font-size: 24px; font-weight: 700; color: #1A1A18; margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: #888780; margin-bottom: 2rem; line-height: 1.5; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: 12px; font-weight: 600; color: #888780; text-transform: uppercase; letter-spacing: 0.3px; }

    input {
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      color: #2C2C28;
      background: #F7F3EC;
      outline: none;
      width: 100%;
    }
    input:focus { border-color: #C9963A; background: #fff; }

    .info-box {
      background: #fffdf5;
      border: 1px solid #C9963A;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #7A5A1A;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: #C9963A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: background 0.2s;
    }
    .btn-register:hover { background: #b8842e; }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

    .message { text-align: center; margin-top: 1rem; font-size: 14px; padding: 12px; border-radius: 8px; display: none; }
    .message.error { background: #f4e8e8; color: #6e2d2d; display: block; }
    .message.success { background: #e8f4e8; color: #2d6e2d; display: block; }

    .login-link { text-align: center; margin-top: 1.5rem; font-size: 13px; color: #888780; }
    .login-link a { color: #C9963A; text-decoration: none; }

    footer { text-align: center; padding: 1.5rem; font-size: 13px; color: #888780; }
    @media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: 1; }
  .card { padding: 1.5rem; margin: 0 1rem; }
  .page { padding: 1rem; }
}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Immo<span>CG</span></a>
    <a href="login.html">Déjà inscrit ? Se connecter</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-title">Devenir partenaire</div>
      <div class="card-sub">Créez votre compte agence pour publier vos biens sur ImmoCG.</div>

      <div class="info-box">
        ⏳ Votre compte sera vérifié par notre équipe avant activation. Vous recevrez une confirmation sous 24h.
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label>Nom de l'agence *</label>
          <input type="text" id="nom_agence" placeholder="ex: Agence Horizon Immo">
        </div>
        <div class="form-group">
          <label>Votre nom *</label>
          <input type="text" id="nom" placeholder="ex: Jean Moukala">
        </div>
        <div class="form-group">
          <label>Téléphone *</label>
          <input type="tel" id="telephone" placeholder="+242 06 883 4146">
        </div>
        <div class="form-group full">
          <label>Email *</label>
          <input type="email" id="email" placeholder="agence@email.com">
        </div>
        <div class="form-group full">
          <label>Mot de passe *</label>
          <input type="password" id="mot_de_passe" placeholder="Minimum 6 caractères">
        </div>
      </div>

      <button class="btn-register" id="btn-register" onclick="sInscrire()">
        Envoyer ma demande
      </button>
      <div class="message" id="message"></div>

      <div class="form-group full" style="margin-top:0.5rem;">
  <label style="display:flex;align-items:flex-start;gap:10px;text-transform:none;font-size:13px;color:#2C2C28;cursor:pointer;">
    <input type="checkbox" id="conditions" style="width:18px;height:18px;margin-top:2px;accent-color:#C9963A;">
    <span>J'ai lu et j'accepte les <a href="conditions.html" target="_blank" style="color:#C9963A;">conditions du partenariat ImmoCG</a> incluant l'abonnement de 10 000 FCFA/mois et la commission de 10%.</span>
  </label>
</div>

      <div class="login-link">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <footer>ImmoCG · Brazzaville, Congo · 2026
    <a href="blog.html">Blog</a>
  </footer>
<script src="js/register.js"></script>
</body>
</html>
