<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoCG — Trouvez votre logement</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F7F3EC;
      color: #2C2C28;
    }

    /* NAVBAR */
    nav {
      background: #1A1A18;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .logo span { color: #C9963A; }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      margin-left: 1.5rem;
    }

    nav a:hover { color: #C9963A; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 4rem 2rem 2rem;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      color: #1A1A18;
      margin-bottom: 1rem;
    }

    .hero h1 span { color: #C9963A; }

    .hero p {
      font-size: 16px;
      color: #888780;
      margin-bottom: 2rem;
    }

    /* BARRE DE RECHERCHE */
    .search-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .search-bar input,
    .search-bar select {
      padding: 12px 16px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    .search-bar button {
      padding: 12px 28px;
      background: #C9963A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .search-bar button:hover { background: #b8842e; }

    /* SECTION BIENS */
    .section {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .section h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #1A1A18;
    }

    /* GRILLE DE CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      transition: transform 0.2s;
      cursor: pointer;
    }

    .card:hover { transform: translateY(-4px); }

    .card-img {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      background: #E8F0E4;
    }

    .card-body { padding: 16px; }

    .card-type {
      font-size: 11px;
      font-weight: 600;
      color: #C9963A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .card-prix {
      font-size: 20px;
      font-weight: 700;
      color: #1A1A18;
      margin-bottom: 4px;
    }

    .card-prix span {
      font-size: 12px;
      color: #888780;
      font-weight: 400;
    }

    .card-loc {
      font-size: 13px;
      color: #888780;
      margin-bottom: 10px;
    }

    .card-feats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #888780;
    }

    .card-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #1A1A18;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card-btn:hover { background: #C9963A; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 3rem;
      color: #888780;
      font-size: 15px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 13px;
      color: #888780;
      border-top: 1px solid rgba(0,0,0,0.08);
      margin-top: 4rem;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Immo<span>CG</span></div>
    <div>
      <a href="#">Acheter</a>
      <a href="#">Louer</a>
      <a href="publier.html">Publier une annonce</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Trouvez le logement<br><span>fait pour vous</span></h1>
    <p>Appartements, villas, studios à Brazzaville et Pointe-Noire</p>

    <div class="search-bar">
      <input type="text" id="search-quartier" placeholder="Quartier, ville...">
      <select id="search-type">
        <option value="">Tous les types</option>
        <option value="Villa">Villa</option>
        <option value="Appartement">Appartement</option>
        <option value="Studio">Studio</option>
      </select>
      <select id="search-mode">
        <option value="">Louer ou Acheter</option>
        <option value="louer">Louer</option>
        <option value="acheter">Acheter</option>
      </select>
      <button onclick="filtrerBiens()">Rechercher</button>
    </div>
  </section>

  <!-- LISTE DES BIENS -->
  <section class="section">
    <h2>Biens disponibles</h2>
    <div class="cards" id="liste-biens">
      <div class="loading">Chargement des biens...</div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    ImmoCG · Brazzaville, Congo · 2026
  </footer>

  <script>
    // On stocke tous les biens récupérés depuis le serveur
    let tousLesBiens = []

    // Fonction pour récupérer les biens depuis notre API
    async function chargerBiens() {
      try {
       const reponse = await fetch('/biens')
        const data = await reponse.json()
        tousLesBiens = data.biens
        afficherBiens(tousLesBiens)
      } catch (erreur) {
        document.getElementById('liste-biens').innerHTML =
          '<div class="loading">Erreur de connexion au serveur.</div>'
      }
    }

    // Fonction pour afficher les biens dans la page
    function afficherBiens(biens) {
      const container = document.getElementById('liste-biens')

      if (biens.length === 0) {
        container.innerHTML = '<div class="loading">Aucun bien trouvé.</div>'
        return
      }

      const icones = { 'Villa': '🏡', 'Appartement': '🏢', 'Studio': '🏠' }

      container.innerHTML = biens.map(bien => `
        <div class="card">
          <div class="card-img" style="${bien.image_url ? `background-image:url(${bien.image_url});background-size:cover;background-position:center;` : ''}">
  ${bien.image_url ? '' : (icones[bien.type] || '🏠')}
</div>
          <div class="card-body">
            <div class="card-type">${bien.type} · ${bien.mode}</div>
            <div class="card-prix">
              ${bien.prix.toLocaleString('fr-FR')}
              <span>${bien.unite}</span>
            </div>
            <div class="card-loc">📍 ${bien.quartier}, ${bien.ville}</div>
            <div class="card-feats">
              <span>🛏 ${bien.chambres} ch.</span>
              <span>🚿 ${bien.salles_bain} sdb.</span>
              <span>📐 ${bien.surface}m²</span>
            </div>
            <button class="card-btn" onclick="voirBien(${bien.id})">
              Voir le détail
            </button>
          </div>
        </div>
      `).join('')
    }

    // Fonction de filtre
    function filtrerBiens() {
      const quartier = document.getElementById('search-quartier').value.toLowerCase()
      const type = document.getElementById('search-type').value
      const mode = document.getElementById('search-mode').value

      const resultats = tousLesBiens.filter(bien => {
        const matchQuartier = quartier === '' ||
          bien.quartier.toLowerCase().includes(quartier) ||
          bien.ville.toLowerCase().includes(quartier)
        const matchType = type === '' || bien.type === type
        const matchMode = mode === '' || bien.mode === mode
        return matchQuartier && matchType && matchMode
      })

      afficherBiens(resultats)
    }

    // Aller vers la page détail
    function voirBien(id) {
  window.location.href = `/bien.html?id=` + id
}

    // On charge les biens au démarrage
    chargerBiens()
  </script>

</body>
</html>
