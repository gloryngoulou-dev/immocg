<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laisser un avis — ImmoCG</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F7F3EC; color: #2C2C28; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }

    .card { background: #fff; border-radius: 18px; padding: 2.2rem; max-width: 460px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }

    .logo { font-size: 22px; font-weight: 700; color: #1A1A18; text-align: center; margin-bottom: 1.5rem; }
    .logo span { color: #C9963A; }

    h1 { font-size: 19px; font-weight: 700; color: #1A1A18; margin-bottom: 6px; text-align: center; }
    .sous { font-size: 13px; color: #888780; text-align: center; margin-bottom: 1.6rem; }

    .stars { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.6rem; }
    .star { font-size: 38px; cursor: pointer; color: #ddd; transition: color 0.15s, transform 0.1s; user-select: none; }
    .star.active { color: #C9963A; }
    .star:hover { transform: scale(1.1); }

    label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid rgba(0,0,0,0.10); border-radius: 10px;
      font-size: 14px; font-family: inherit; background: #FBFAF7; outline: none; resize: vertical;
      margin-bottom: 1.4rem; box-sizing: border-box;
    }

    button#btn-envoyer {
      width: 100%; background: #C9963A; color: #fff; border: none; padding: 13px;
      border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    button#btn-envoyer:disabled { opacity: 0.6; cursor: default; }

    .erreur { color: #b3331f; font-size: 13px; background: #FBEAE7; border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; display: none; }

    .etat { text-align: center; padding: 1rem 0; }
    .etat-emoji { font-size: 46px; margin-bottom: 1rem; }
    .etat h2 { font-size: 19px; font-weight: 700; color: #1A1A18; margin-bottom: 8px; }
    .etat p { color: #555; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="logo">Immo<span>CG</span></div>
    <div id="contenu">
      <p style="text-align:center;color:#888;">Chargement...</p>
    </div>
  </div>

  <script src="js/avis.js"></script>
</body>
</html>
