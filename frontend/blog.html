<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog ImmoCG — Conseils immobilier au Congo</title>
  <meta name="description" content="Conseils pour trouver un logement au Congo, prix des loyers à Brazzaville, droits du locataire, guide achat immobilier Congo.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F7F3EC; color: #2C2C28; }
    nav { background: #1A1A18; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; }
    .logo span { color: #C9963A; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; margin-left: 1.5rem; }
    nav a:hover { color: #C9963A; }

    .hero { background: #1A1A18; padding: 3rem 2rem; text-align: center; }
    .hero h1 { font-size: 30px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .hero p { color: rgba(255,255,255,0.5); font-size: 15px; }

    .container { max-width: 900px; margin: 3rem auto; padding: 0 2rem 4rem; }

    .articles { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    .article {
      background: #fff;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .article:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }

    .article-img {
  height: 160px;
  background-size: cover;
  background-position: center;
  position: relative;
}
.article-img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
  display: flex;
  align-items: flex-end;
  padding: 12px;
}
.article-img-cat {
  background: #C9963A;
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 40px;
  text-transform: uppercase;
}

    .article-body { padding: 1.2rem; }
    .article-cat { font-size: 11px; font-weight: 600; color: #C9963A; text-transform: uppercase; margin-bottom: 6px; }
    .article-titre { font-size: 15px; font-weight: 700; color: #1A1A18; margin-bottom: 8px; line-height: 1.4; }
    .article-desc { font-size: 13px; color: #888780; line-height: 1.6; margin-bottom: 12px; }
    .article-meta { font-size: 11px; color: #aaa; }

    .article-full {
      display: none;
      background: #fff;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .article-full.active { display: block; }
    .article-full h2 { font-size: 24px; font-weight: 700; margin-bottom: 1rem; }
    .article-full p { font-size: 14px; color: #444; line-height: 1.8; margin-bottom: 1rem; }
    .article-full h3 { font-size: 17px; font-weight: 600; margin: 1.5rem 0 0.8rem; color: #1A1A18; }
    .article-full ul { padding-left: 1.2rem; margin-bottom: 1rem; }
    .article-full ul li { font-size: 14px; color: #444; line-height: 1.8; }
    .btn-retour { background: #F7F3EC; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: 'Segoe UI', sans-serif; margin-bottom: 1.5rem; color: #2C2C28; }

    @media (max-width: 768px) {
      .container { padding: 0 1rem 3rem; }
      .articles { grid-template-columns: 1fr; }
    }

    footer { text-align: center; padding: 2rem; font-size: 13px; color: #888780; border-top: 1px solid rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Immo<span>CG</span></a>
    <div>
      <a href="index.html">Accueil</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="hero">
    <h1>📰 Blog ImmoCG</h1>
    <p>Conseils, guides et actualités immobilières au Congo</p>
  </div>

  <div class="container">

    <!-- ARTICLE COMPLET (caché par défaut) -->
    <div class="article-full" id="article-complet"></div>

    <!-- LISTE DES ARTICLES -->
    <div class="articles" id="liste-articles"></div>
  </div>

  <footer>ImmoCG · Brazzaville, Congo · 2026
    <a href="blog.html">Blog</a>
  </footer>

  <script>
    const articles = [
  {
    id: 1,
    image: 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=600&q=80',
    cat: 'Guide locataire',
    titre: 'Comment trouver un appartement à Brazzaville en 2026',
    desc: 'Nos conseils pratiques pour trouver votre logement rapidement et en toute sécurité.',
    date: 'Mai 2026',
    contenu: `
      <h3>1. Définissez votre budget</h3>
      <p>Prévoyez 3 mois de loyer pour emménager : 2 mois de caution remboursable + 1 mois de frais d'agence.</p>
      <h3>2. Choisissez votre quartier</h3>
      <ul>
        <li><strong>Bacongo</strong> : Calme, résidentiel</li>
        <li><strong>Poto-Poto</strong> : Animé, central</li>
        <li><strong>Moungali</strong> : Populaire, accessibles</li>
        <li><strong>Centre-ville</strong> : Premium</li>
      </ul>
      <h3>3. Passez par une agence certifiée ImmoCG</h3>
      <p>Biens vérifiés, prix réels, accompagnement professionnel.</p>
      <h3>4. Vérifiez le bien avant de signer</h3>
      <ul>
        <li>Visitez en journée</li>
        <li>Vérifiez eau et électricité</li>
        <li>Testez la plomberie</li>
        <li>Vérifiez la sécurité du quartier</li>
      </ul>
    `
  },
  {
    id: 2,
    image: 'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=600&q=80',
    cat: 'Prix du marché',
    titre: 'Prix des loyers à Brazzaville en 2026 — quartier par quartier',
    desc: 'Les prix moyens dans chaque quartier pour mieux préparer votre budget.',
    date: 'Mai 2026',
    contenu: `
      <h3>Studios (1 pièce)</h3>
      <ul>
        <li>Moungali / Ouenzé : 50 000 — 100 000 FCFA</li>
        <li>Poto-Poto / Bacongo : 80 000 — 150 000 FCFA</li>
        <li>Centre-ville : 150 000 — 250 000 FCFA</li>
      </ul>
      <h3>Appartements F2/F3</h3>
      <ul>
        <li>Quartiers populaires : 100 000 — 200 000 FCFA</li>
        <li>Résidentiels : 200 000 — 400 000 FCFA</li>
        <li>Standing : 400 000 — 800 000 FCFA</li>
      </ul>
      <h3>Villas</h3>
      <ul>
        <li>Standard : 300 000 — 600 000 FCFA</li>
        <li>Haut standing : 1 200 000 FCFA et plus</li>
      </ul>
    `
  },
  {
    id: 3,
    image: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=600&q=80',
    cat: 'Droits & Lois',
    titre: 'Droits du locataire au Congo — ce que vous devez savoir',
    desc: 'Connaissez vos droits pour éviter les abus et les arnaques.',
    date: 'Mai 2026',
    contenu: `
      <h3>La loi qui vous protège</h3>
      <p>Loi n° 37-2012 portant réglementation de la location à usage d'habitation.</p>
      <h3>Vos droits</h3>
      <ul>
        <li>Contrat de bail écrit obligatoire</li>
        <li>Caution remboursable à la fin du bail</li>
        <li>Préavis obligatoire avant résiliation</li>
        <li>Logement en bon état garanti</li>
      </ul>
      <h3>Vos obligations</h3>
      <ul>
        <li>Payer le loyer à temps</li>
        <li>Entretenir le logement</li>
        <li>Pas de sous-location sans accord</li>
      </ul>
    `
  },
  {
    id: 4,
    image: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&q=80',
    cat: 'Investissement',
    titre: 'Acheter un bien au Congo — guide complet',
    desc: 'Tout ce qu\'il faut savoir avant d\'acheter terrain, maison ou appartement.',
    date: 'Mai 2026',
    contenu: `
      <h3>Les frais</h3>
      <ul>
        <li>Commission agence : 10% (payée par le vendeur)</li>
        <li>Frais notaire : 5% (à votre charge)</li>
      </ul>
      <h3>Documents à vérifier</h3>
      <ul>
        <li>Titre foncier (le plus sûr)</li>
        <li>Attestation villagéoise</li>
        <li>Permis de construire</li>
      </ul>
      <h3>⚠️ Attention</h3>
      <p>Ne jamais payer sans titre foncier vérifié par un notaire.</p>
    `
  }
]

function afficherArticles() {
  const container = document.getElementById('liste-articles')
  container.innerHTML = articles.map(a => `
    <div class="article" onclick="lireArticle(${a.id})">
      <div class="article-img" style="background-image:url(${a.image});">
        <div class="article-img-overlay">
          <span class="article-img-cat">${a.cat}</span>
        </div>
      </div>
      <div class="article-body">
        <div class="article-titre">${a.titre}</div>
        <div class="article-desc">${a.desc}</div>
        <div class="article-meta">📅 ${a.date} · 3 min de lecture</div>
      </div>
    </div>
  `).join('')
}

    function lireArticle(id) {
      const a = articles.find(x => x.id === id)
      if (!a) return
      const el = document.getElementById('article-complet')
      el.innerHTML = `
        <button class="btn-retour" onclick="fermerArticle()">← Retour aux articles</button>
        <div class="article-cat">${a.cat}</div>
        <h2>${a.titre}</h2>
        <div class="article-meta" style="margin-bottom:1.5rem;">📅 ${a.date}</div>
        ${a.contenu}
        <div style="margin-top:2rem;padding:1.5rem;background:#F7F3EC;border-radius:10px;">
          <p style="font-size:14px;color:#444;">Vous cherchez un logement au Congo ? <a href="index.html" style="color:#C9963A;font-weight:600;">Consultez nos annonces →</a></p>
        </div>
      `
      el.classList.add('active')
      document.getElementById('liste-articles').style.display = 'none'
      el.scrollIntoView({ behavior: 'smooth' })
    }

    function fermerArticle() {
      document.getElementById('article-complet').classList.remove('active')
      document.getElementById('liste-articles').style.display = 'grid'
    }

    afficherArticles()
  </script>
</body>
</html>
