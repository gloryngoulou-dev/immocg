<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZLM0TRVDG9"></script>
<script src="js/gtag.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoCG — Détail du bien</title>
  <meta name="description" id="meta-desc" content="Bien immobilier à louer ou à vendre au Congo sur ImmoCG.">
  <meta property="og:title" id="og-title" content="ImmoCG — Bien immobilier">
  <meta property="og:image" id="og-image" content="">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- DOMPurify — protection XSS pour les contenus dynamiques -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F7F3EC;
      color: #2C2C28;
    }

    nav {
      background: #1A1A18;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 22px; font-weight: 700; color: #fff; }
    .logo span { color: #C9963A; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; margin-left: 1.5rem; }
    nav a:hover { color: #C9963A; }

    .breadcrumb {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 0 2rem;
      font-size: 13px;
      color: #888780;
    }

    .breadcrumb a { color: #C9963A; text-decoration: none; }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
    }

    @media (max-width: 768px) {
  .feats { gap: 1rem; }
  .equipements { grid-template-columns: 1fr; }
  .contact-card { position: static; }
}

    

    .bien-img {
      height: 300px;
      background: #E8F0E4;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      margin-bottom: 1.5rem;
    }

    .bien-type {
      font-size: 12px;
      font-weight: 600;
      color: #C9963A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .bien-titre {
      font-size: 28px;
      font-weight: 700;
      color: #1A1A18;
      margin-bottom: 6px;
    }

    .bien-loc {
      font-size: 14px;
      color: #888780;
      margin-bottom: 1.5rem;
    }

    .bien-prix {
      font-size: 32px;
      font-weight: 700;
      color: #1A1A18;
      margin-bottom: 1.5rem;
    }

    .bien-prix span {
      font-size: 14px;
      color: #888780;
      font-weight: 400;
    }

    .feats {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      padding: 1.2rem 0;
      border-top: 1px solid rgba(0,0,0,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }

    .feat { text-align: center; }
    .feat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .feat-val { font-size: 14px; font-weight: 600; color: #1A1A18; }
    .feat-lbl { font-size: 11px; color: #888780; }

    .section-titre {
      font-size: 16px;
      font-weight: 600;
      color: #1A1A18;
      margin-bottom: 10px;
      margin-top: 1.5rem;
    }

    .description {
      font-size: 14px;
      color: #444;
      line-height: 1.7;
    }

    .equipements {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .equip {
      font-size: 13px;
      color: #2C2C28;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .contact-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 1.5rem;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    .agent {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #F0D9A8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #7A5A1A;
    }

    .agent-nom { font-size: 14px; font-weight: 600; color: #1A1A18; }
    .agent-role { font-size: 12px; color: #888780; margin-top: 2px; }
    .agent-phone { font-size: 12px; color: #C9963A; margin-top: 4px; text-decoration: none; display: inline-block; }
    .agent-email { font-size: 11px; color: #888780; text-decoration: none; display: block; margin-top: 2px; }

    .prix-resume {
      background: #F7F3EC;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 1.2rem;
      font-size: 13px;
    }

    .prix-ligne {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #555;
      padding: 4px 0;
    }

    .prix-ligne.total {
      margin-bottom: 0;
      font-weight: 700;
      color: #1A1A18;
      padding-top: 10px;
      border-top: 2px solid #C9963A;
      margin-top: 6px;
      font-size: 15px;
    }

    .prix-ligne span:first-child { font-weight: 500; }
    .prix-ligne span:last-child { font-weight: 600; }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .btn-primary { background: #1A1A18; color: #fff; }
    .btn-primary:hover { background: #C9963A; }
    .btn-reserve { background: #C9963A; color: #fff; border: none; }
    .btn-reserve:hover { background: #a87830; }
    .btn-signaler { background: none; border: 1px solid #ddd; color: #888; font-size: 12px; }
    .btn-signaler:hover { border-color: #e74c3c; color: #e74c3c; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
      color: #555;
    }
    .btn-outline:hover { border-color: #C9963A; color: #C9963A; }

    .loading {
      text-align: center;
      padding: 4rem;
      color: #888780;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 13px;
      color: #888780;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .galerie { margin-bottom: 1.5rem; }
    .galerie-main {
      height: 320px;
      border-radius: 14px;
      margin-bottom: 8px;
      transition: background-image 0.3s;
      background-color: #E8F0E4;
      background-size: cover;
      background-position: center;
    }
    .galerie-thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .galerie-thumbs .thumb {
      width: 80px;
      height: 60px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      background-color: #E8F0E4;
      background-size: cover;
      background-position: center;
    }
    .galerie-thumbs .thumb.active { border-color: #C9963A; }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1A1A18;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .badge-meuble { background: #E8F0E4; color: #4A7C2E; }
    .badge-etat { background: #F0E6D9; color: #C9963A; }
    .badge-stationnement { background: #E3E8F0; color: #2C5F8A; }

    .frais-section {
      margin-top: 8px;
    }

    .info-frais {
      font-size: 10px;
      color: #888;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    @media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
    padding: 0 1rem 3rem;
  }
  .contact-card {
    position: static;
    order: -1;
  }
  .galerie-main { height: 240px; }
  .bien-titre { font-size: 22px; }
  .bien-prix { font-size: 24px; }
  .feats { gap: 1rem; flex-wrap: wrap; }
  .equipements { grid-template-columns: 1fr; }
  .breadcrumb { padding: 0 1rem; }
  nav a { font-size: 13px; }
}
@media (max-width: 480px) {
  .galerie-thumbs .thumb { width: 60px; height: 48px; }
  .btn { padding: 11px; font-size: 13px; }
}
  </style>
</head>

  </div>
</nav>

  <div class="breadcrumb">
    <a href="index.html">Accueil</a> › <span id="breadcrumb-type">Bien</span>
  </div>

  <div class="container" id="contenu">
    <div class="loading">Chargement du bien...</div>
  </div>

  <footer>ImmoCG · Brazzaville, Congo · 2026
    <a href="blog.html">Blog</a>
  </footer>
<script src="js/bien.js"></script>
</body>
</html>
