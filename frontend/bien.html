<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmoCG — Détail du bien</title>
  <meta name="description" id="meta-desc" content="Bien immobilier à louer ou à vendre au Congo sur ImmoCG.">
  <meta property="og:title" id="og-title" content="ImmoCG — Bien immobilier">
  <meta property="og:image" id="og-image" content="">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F7F3EC;
      color: #2C2C28;
    }

    nav {
      background: #1A1A18;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 22px; font-weight: 700; color: #fff; }
    .logo span { color: #C9963A; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; margin-left: 1.5rem; }
    nav a:hover { color: #C9963A; }

    .breadcrumb {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 0 2rem;
      font-size: 13px;
      color: #888780;
    }

    .breadcrumb a { color: #C9963A; text-decoration: none; }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
    }

    @media (max-width: 768px) {
  .feats { gap: 1rem; }
  .equipements { grid-template-columns: 1fr; }
  .contact-card { position: static; }
}

    

    .bien-img {
      height: 300px;
      background: #E8F0E4;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      margin-bottom: 1.5rem;
    }

    .bien-type {
      font-size: 12px;
      font-weight: 600;
      color: #C9963A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .bien-titre {
      font-size: 28px;
      font-weight: 700;
      color: #1A1A18;
      margin-bottom: 6px;
    }

    .bien-loc {
      font-size: 14px;
      color: #888780;
      margin-bottom: 1.5rem;
    }

    .bien-prix {
      font-size: 32px;
      font-weight: 700;
      color: #1A1A18;
      margin-bottom: 1.5rem;
    }

    .bien-prix span {
      font-size: 14px;
      color: #888780;
      font-weight: 400;
    }

    .feats {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      padding: 1.2rem 0;
      border-top: 1px solid rgba(0,0,0,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }

    .feat { text-align: center; }
    .feat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .feat-val { font-size: 14px; font-weight: 600; color: #1A1A18; }
    .feat-lbl { font-size: 11px; color: #888780; }

    .section-titre {
      font-size: 16px;
      font-weight: 600;
      color: #1A1A18;
      margin-bottom: 10px;
      margin-top: 1.5rem;
    }

    .description {
      font-size: 14px;
      color: #444;
      line-height: 1.7;
    }

    .equipements {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .equip {
      font-size: 13px;
      color: #2C2C28;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .contact-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 1.5rem;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    .agent {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #F0D9A8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #7A5A1A;
    }

    .agent-nom { font-size: 14px; font-weight: 600; color: #1A1A18; }
    .agent-role { font-size: 12px; color: #888780; margin-top: 2px; }
    .agent-phone { font-size: 12px; color: #C9963A; margin-top: 4px; text-decoration: none; display: inline-block; }
    .agent-email { font-size: 11px; color: #888780; text-decoration: none; display: block; margin-top: 2px; }

    .prix-resume {
      background: #F7F3EC;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 1.2rem;
      font-size: 13px;
    }

    .prix-ligne {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #555;
      padding: 4px 0;
    }

    .prix-ligne.total {
      margin-bottom: 0;
      font-weight: 700;
      color: #1A1A18;
      padding-top: 10px;
      border-top: 2px solid #C9963A;
      margin-top: 6px;
      font-size: 15px;
    }

    .prix-ligne span:first-child { font-weight: 500; }
    .prix-ligne span:last-child { font-weight: 600; }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .btn-primary { background: #1A1A18; color: #fff; }
    .btn-primary:hover { background: #C9963A; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
      color: #555;
    }
    .btn-outline:hover { border-color: #C9963A; color: #C9963A; }

    .loading {
      text-align: center;
      padding: 4rem;
      color: #888780;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 13px;
      color: #888780;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .galerie { margin-bottom: 1.5rem; }
    .galerie-main {
      height: 320px;
      border-radius: 14px;
      margin-bottom: 8px;
      transition: background-image 0.3s;
      background-color: #E8F0E4;
      background-size: cover;
      background-position: center;
    }
    .galerie-thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .galerie-thumbs .thumb {
      width: 80px;
      height: 60px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      background-color: #E8F0E4;
      background-size: cover;
      background-position: center;
    }
    .galerie-thumbs .thumb.active { border-color: #C9963A; }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1A1A18;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .badge-meuble { background: #E8F0E4; color: #4A7C2E; }
    .badge-etat { background: #F0E6D9; color: #C9963A; }
    .badge-stationnement { background: #E3E8F0; color: #2C5F8A; }

    .frais-section {
      margin-top: 8px;
    }

    .info-frais {
      font-size: 10px;
      color: #888;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" style="text-decoration:none;"><div class="logo">Immo<span>CG</span></div></a>
    
    <div>
      <a href="index.html">← Retour aux biens</a>
    </div>
  </nav>

  <div class="breadcrumb">
    <a href="index.html">Accueil</a> › <span id="breadcrumb-type">Bien</span>
  </div>

  <div class="container" id="contenu">
    <div class="loading">Chargement du bien...</div>
  </div>

  <footer>ImmoCG · Brazzaville, Congo · 2026</footer>

  <script>
    // Configuration des taux - À MODIFIER SELON VOS TAUX RÉELS
    const TAUX_CAUTION_MOIS = 3
    const TAUX_FRAIS_AGENCE_LOCATION = 1.0
    const TAUX_FRAIS_AGENCE_VENTE = 0.10
    const TAUX_FRAIS_NOTAIRE_VENTE = 0.05
    const FRAIS_VISITE = 5000

    // Récupérer l'ID dans l'URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function chargerBien() {
      if (!id) {
        document.getElementById('contenu').innerHTML =
          '<div class="loading">Aucun bien sélectionné.</div>';
        return;
      }

      try {
        const reponse = await fetch(`/biens/${id}`);
        const data = await reponse.json();

        if (!data.success) {
          document.getElementById('contenu').innerHTML =
            '<div class="loading">Bien introuvable.</div>';
          return;
        }

        afficherBien(data.bien);

      } catch (erreur) {
        console.error('Erreur:', erreur);
        document.getElementById('contenu').innerHTML = `
          <div class="loading">
            ⚠️ Erreur de connexion au serveur.<br>
            <small>Vérifiez que l'API /biens/${id} est accessible.</small>
          </div>`;
      }
    }

    function afficherBien(b) {
      // Récupération des champs
      const titre = b.titre || b.Titre || `${b.Type || b.type || 'Bien'} à ${b.Quartier || b.quartier || ''}`;
      const type = b.Type || b.type || 'Bien';
      const quartier = b.Quartier || b.quartier || '';
      const ville = b.ville || 'Brazzaville';
      const adresse = b.adresse || '';
      const prix = b.Prix || b.prix || 0;
      const unite = b.unite || 'FCFA';
      const mode = (b.mode || b.Mode || '').toLowerCase();
      const estLocation = mode === 'louer' || mode === 'location';
      const modeLabel = estLocation ? '📍 À LOUER' : '💰 À VENDRE';
      const chambres = b.Chambres || b.chambres || 0;
      const sallesBain = b.salles_bain || 0;
      const surface = b.Surface || b.surface || 0;
      const surfaceTerrain = b.surface_terrain || 0;
      const description = b.Description || b.description || 'Aucune description disponible.';
      const etat = b.ETAT || b.etat || '';
      const meuble = b.meuble || '';
      const etage = b.Etage || b.etage || '';
      const stationnement = b.Stationnement || b.stationnement || '';
      
      // Images
      let images = [];
      if (b.Images && Array.isArray(b.Images)) {
        images = b.Images;
      } else if (b.images && Array.isArray(b.images)) {
        images = b.images;
      } else if (b.image_url) {
        images = [b.image_url];
      }
      
      const imagePrincipale = images.length > 0 ? images[0] : 'https://placehold.co/800x400?text=Image+non+disponible';

      // Équipements
      let equipements = [];
      if (b.Équipements && Array.isArray(b.Équipements)) {
        equipements = b.Équipements;
      } else if (b.equipements && Array.isArray(b.equipements)) {
        equipements = b.equipements;
      }

      // Contact
      const contactNom = b.contact_nom || 'Agence ImmoCG';
      const contactTel = b.contact_tel || b.Téléphone || '+242 05 123 4567';
      const contactWhatsapp = b.contact_whatsapp || '';
      const contactEmail = b.contact_email || 'contact@immocg.com';
      const contactInitiales = contactNom !== 'Agence ImmoCG' 
        ? contactNom.split(' ').map(n => n[0]).join('').substring(0, 2) 
        : 'AG';

      // ========== CALCUL DES FRAIS (TOUJOURS AFFICHÉS) ==========
      
      
      let caution = 0;
      let fraisNotaire = 0;
      let total = prix;
      let detailsHTML = ''

if (mode === 'louer' || mode === 'location') {
  const caution = prix * TAUX_CAUTION_MOIS
  const fraisAgence = prix * TAUX_FRAIS_AGENCE_LOCATION
  const total = prix + caution + fraisAgence + FRAIS_VISITE

  detailsHTML = `
    <div class="prix-ligne">
      <span>🏠 Loyer mensuel</span>
      <span>${prix.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne">
      <span>🔒 Caution (3 mois)</span>
      <span>${caution.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne">
      <span>🏢 Frais d'agence (1 mois)</span>
      <span>${fraisAgence.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne">
      <span>👁️ Frais de visite</span>
      <span>${FRAIS_VISITE.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne total">
      <span>💰 TOTAL À PRÉVOIR</span>
      <span>${total.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="info-frais">
      ⓘ Caution remboursable. Loyer mensuel hors charges.
    </div>
  `
} else {
  const fraisAgence = Math.round(prix * TAUX_FRAIS_AGENCE_VENTE)
  const fraisNotaire = Math.round(prix * TAUX_FRAIS_NOTAIRE_VENTE)
  const total = prix + fraisAgence + fraisNotaire

  detailsHTML = `
    <div class="prix-ligne">
      <span>🏠 Prix de vente</span>
      <span>${prix.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne">
      <span>🏢 Commission agence (10%)</span>
      <span>${fraisAgence.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne">
      <span>⚖️ Frais de notaire (5%)</span>
      <span>${fraisNotaire.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="prix-ligne total">
      <span>💰 TOTAL ACQUISITION</span>
      <span>${total.toLocaleString('fr-FR')} FCFA</span>
    </div>
    <div class="info-frais">
      ⓘ Commission agence payée par le vendeur.
    </div>
  `
}

      // Badges
      const badges = [];
      if (meuble) badges.push(`<span class="badge badge-meuble">${meuble === 'oui' ? '🏠 Meublé' : '🔑 Non meublé'}</span>`);
      if (etat) badges.push(`<span class="badge badge-etat">🔧 ${etat}</span>`);
      if (stationnement) badges.push(`<span class="badge badge-stationnement">🅿️ ${stationnement}</span>`);
      if (etage && etage !== '0') badges.push(`<span class="badge">📌 Étage: ${etage}</span>`);

      const adresseComplete = [adresse, quartier, ville].filter(a => a && a.trim()).join(', ');

      document.getElementById('contenu').innerHTML = `
        <div>
          <div class="galerie">
            <div class="galerie-main" id="main-photo" style="background-image:url(${imagePrincipale});"></div>
            ${images.length > 1 ? `
            <div class="galerie-thumbs">
              ${images.map((url, i) => `
                <div class="thumb ${i===0?'active':''}" style="background-image:url(${url});" 
                     onclick="changePhoto('${url}', this)"></div>
              `).join('')}
            </div>` : ''}
          </div>

          <div class="bien-type">${type} · ${modeLabel}</div>
          <div class="bien-titre">${titre}</div>
          <div class="bien-loc">
            📍 ${adresseComplete || quartier} · Réf. IMC-${String(b.id).padStart(4, '0')}
          </div>
          
          <div class="bien-prix">
            ${prix.toLocaleString('fr-FR')}
            <span>${unite}${mode === 'location' ? '/mois' : ''}</span>
          </div>

          <div class="feats">
            <div class="feat">
              <span class="feat-icon">🛏</span>
              <div class="feat-val">${chambres}</div>
              <div class="feat-lbl">Chambres</div>
            </div>
            <div class="feat">
              <span class="feat-icon">🚿</span>
              <div class="feat-val">${sallesBain}</div>
              <div class="feat-lbl">Salles de bain</div>
            </div>
            <div class="feat">
              <span class="feat-icon">📐</span>
              <div class="feat-val">${surface}m²</div>
              <div class="feat-lbl">Surface habitable</div>
            </div>
            ${surfaceTerrain > 0 ? `
            <div class="feat">
              <span class="feat-icon">🌳</span>
              <div class="feat-val">${surfaceTerrain}m²</div>
              <div class="feat-lbl">Terrain</div>
            </div>` : ''}
          </div>

          ${badges.length > 0 ? `
          <div class="section-titre">Caractéristiques</div>
          <div>${badges.join('')}</div>` : ''}

          <div class="section-titre">Description</div>
          <div class="description">${description.replace(/\n/g, '<br>')}</div>

          ${b.video_url ? `
          <div class="section-titre">Visite virtuelle</div>
          <div style="position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;margin-bottom:1.5rem;">
            <iframe src="${b.video_url.includes('youtube') ? b.video_url.replace('watch?v=', 'embed/') : b.video_url}" 
              style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"
              allowfullscreen></iframe>
          </div>` : ''}

          <div class="section-titre">Équipements & services</div>
          <div class="equipements">
            ${equipements.length > 0 
              ? equipements.map(e => `<div class="equip">✅ ${typeof e === 'string' ? e : e.nom || e}</div>`).join('') 
              : '<div class="equip" style="color:#888780">Aucun équipement renseigné</div>'}
          </div>
        </div>

        <div class="contact-card">
          <div class="agent">
            <div class="agent-avatar">${contactInitiales}</div>
            <div>
              <div class="agent-nom">${contactNom}</div>
              <div class="agent-role">Agent immobilier</div>
              ${contactTel && contactTel !== '+242 05 123 4567' ? `<a href="tel:${contactTel}" class="agent-phone">📞 ${contactTel}</a>` : ''}
              ${contactWhatsapp ? `<a href="https://wa.me/${contactWhatsapp.replace(/[^0-9]/g, '')}" class="agent-phone" target="_blank">💬 WhatsApp</a>` : ''}
              ${contactEmail ? `<a href="mailto:${contactEmail}" class="agent-email">✉️ ${contactEmail}</a>` : ''}
            </div>
          </div>

          <div class="prix-resume">
            ${detailsHTML}
          </div>

          <button class="btn btn-primary" onclick="contacterAgence('${contactNom.replace(/'/g, "\\'")}', '${contactTel}')">📞 Contacter ${contactNom.split(' ')[0]}</button>
          <button class="btn btn-outline" onclick="envoyerMessage(${b.id}, '${contactWhatsapp || contactTel}')">💬 Envoyer un message</button>
          <button class="btn btn-outline" onclick="sauvegarderBien(${b.id})">❤️ Sauvegarder</button>
        </div>
      `;

      // SEO dynamique
        document.title = `${titre} — ${quartier}, ${ville} | ImmoCG`
        const metaDesc = document.getElementById('meta-desc')
        if (metaDesc) metaDesc.content = `${type} à ${mode === 'louer' ? 'louer' : 'vendre'} à ${quartier}, ${ville}. ${parseInt(prix).toLocaleString('fr-FR')} FCFA. ${description.substring(0, 100)}...`
        const ogTitle = document.getElementById('og-title')
        if (ogTitle) ogTitle.content = `${titre} — ImmoCG`
        const ogImage = document.getElementById('og-image')
        if (ogImage && images[0]) ogImage.content = images[0]
    }

    // Fonctions interactives
    function contacterAgence(nom, phone) {
      if (!phone || phone === '+242 05 123 4567') {
        showToast(`📞 Contactez ${nom} via le formulaire de contact`);
        return;
      }
      if (confirm(`Voulez-vous appeler ${nom} au ${phone} ?`)) {
        window.location.href = `tel:${phone}`;
      }
    }

    function envoyerMessage(bienId, whatsapp) {
      const message = prompt("Votre message :\n\nExprimez votre intérêt pour ce bien :");
      if (message && message.trim()) {
        if (whatsapp && whatsapp !== '+242 05 123 4567') {
          const numClean = whatsapp.replace(/[^0-9]/g, '');
          if (numClean && numClean.length > 8) {
            const url = `https://wa.me/${numClean}?text=${encodeURIComponent(message + '\n\nBien #' + bienId)}`;
            window.open(url, '_blank');
            return;
          }
        }
        showToast(`✓ Message envoyé à l'agence. Nous vous répondrons sous 24h.`);
        console.log(`Message pour bien #${bienId}:`, message);
      }
    }

    function sauvegarderBien(bienId) {
      let favoris = JSON.parse(localStorage.getItem('favoris_immocg') || '[]');
      if (!favoris.includes(bienId)) {
        favoris.push(bienId);
        localStorage.setItem('favoris_immocg', JSON.stringify(favoris));
        showToast(`✓ Bien ajouté à vos favoris (${favoris.length} bien(s))`);
      } else {
        favoris = favoris.filter(id => id !== bienId);
        localStorage.setItem('favoris_immocg', JSON.stringify(favoris));
        showToast(`❤️ Bien retiré de vos favoris`);
      }
    }

    function changePhoto(url, el) {
      document.getElementById('main-photo').style.backgroundImage = `url(${url})`;
      document.querySelectorAll('.galerie-thumbs .thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    chargerBien();
  </script>
</body>
</html>
